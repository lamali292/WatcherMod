name: Upload to NexusMods

# Fires when release.ps1 runs `gh release create ...` (a published, non-draft release).
on:
  release:
    types: [published]

jobs:
  nexus:
    runs-on: ubuntu-latest
    steps:
      - name: Download the release zip
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
        run: gh release download "$TAG" --repo "$REPO" --pattern '*.zip'

      - name: Resolve filename + version
        id: meta
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          {
            echo "filename=$(ls *.zip | head -n1)"
            echo "version=${TAG#v}"
          } >> "$GITHUB_OUTPUT"

      - name: Upload to NexusMods
        uses: Nexus-Mods/upload-action@v1.0.0-beta.7
        with:
          api_key: ${{ secrets.NEXUSMODS_API_KEY }}
          file_group_id: 7342526
          filename: ${{ steps.meta.outputs.filename }}
          version: ${{ steps.meta.outputs.version }}
          display_name: ${{ github.event.release.name }}
          description: ${{ github.event.release.body }}
          file_category: main
          archive_existing_file: true
          allow_mod_manager_download: true